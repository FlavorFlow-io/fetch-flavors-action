name: FlavorFlow Fetch Clients
description: Fetch Clients from API and generate matrix for builds

branding:
  icon: smartphone
  color: blue

inputs:
  api-key:
    description: 'The project API key to fetch Clients'
    required: true
  project-id:
    description: 'The project ID to fetch Clients for'
    required: true

outputs:
  flavors:
    description: 'JSON array of build-matrix entries, one per Client. Each entry has name, app_name, and config (the full client configuration as a JSON string). Feed it to a matrix with include + fromJson(...), and pass matrix.config straight to apply-flavor-action.'

runs:
  using: node24
  main: dist/index.js